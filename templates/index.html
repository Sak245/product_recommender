<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Flipkart AI Product Advisor</title>
		
		<!-- Bootstrap & FontAwesome CSS CDNs -->
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
		<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
		
		<!-- jQuery & Marked.js (Markdown parser) CDNs -->
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		
		<!-- Custom Premium CSS -->
		<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
	</head>
	
	<body>
		<div class="container-fluid h-100">
			<div class="row justify-content-center h-100">		
				<div class="col-md-8 col-xl-6 chat">
					<div class="card">
						<div class="card-header">
							<div class="d-flex align-items-center">
								<div class="img_cont">
									<!-- Modern Flat 3D Shopping Bot Avatar -->
									<img src="https://cdn-icons-png.flaticon.com/512/8649/8649607.png" class="user_img" alt="Advisor Bot">
									<span class="online_icon"></span>
								</div>
								<div class="user_info">
									<span>Flipkart AI Advisor</span>
									<p>Online &amp; Ready</p>
								</div>
							</div>
						</div>
						
						<!-- Messages Box -->
						<div id="messageFormeight" class="card-body msg_card_body">
							<!-- Messages dynamically loaded here -->
						</div>
						
						<!-- Input Area -->
						<div class="card-footer">
							<form id="messageArea" class="input-group">
                                <input type="text" id="text" name="msg" placeholder="Ask about product reviews (e.g. OnePlus headset)..." autocomplete="off" class="form-control type_msg" required/>
								<div class="input-group-append">
									<button type="submit" id="send" class="send_btn">
										<i class="fas fa-paper-plane"></i>
									</button>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
		
		<script>
			$(document).ready(function() {
				// Initialize bot greeting
				const initDate = new Date();
				const initHour = initDate.getHours().toString().padStart(2, '0');
				const initMin = initDate.getMinutes().toString().padStart(2, '0');
				const initTime = initHour + ":" + initMin;
				
				const greeting = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/8649/8649607.png" class="user_img_msg" alt="Bot"></div><div class="msg_cotainer">👋 Hello! I am your **Flipkart AI Product Advisor**. Ask me about products, reviews, or specifications, and I will search our database and summarize the reviews for you!<span class="msg_time">' + initTime + '</span></div></div>';
				
				// Parse markdown for greeting and append
				$("#messageFormeight").append(marked.parse(greeting));

				// Auto-scroll function
				function scrollToBottom() {
					var chatBody = $("#messageFormeight");
					chatBody.animate({ scrollTop: chatBody.prop("scrollHeight") }, 400);
				}

				scrollToBottom();

				// Submit message handler
				$("#messageArea").on("submit", function(event) {
					const date = new Date();
					const hour = date.getHours().toString().padStart(2, '0');
					const minute = date.getMinutes().toString().padStart(2, '0');
					const str_time = hour + ":" + minute;
					var rawText = $("#text").val();

					// Glass profile styled user icon
					var userHtml = '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">' + rawText + '<span class="msg_time_send">' + str_time + '</span></div><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/3177/3177440.png" class="user_img_msg" alt="User"></div></div>';
					
					$("#text").val("");
					$("#messageFormeight").append(userHtml);
					scrollToBottom();

					$.ajax({
						data: {
							msg: rawText,	
						},
						type: "POST",
						url: "/get",
					}).done(function(data) {
						// Parse markdown from bot reply using Marked.js
						var parsedReply = marked.parse(data);
						
						var botHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/8649/8649607.png" class="user_img_msg" alt="Bot"></div><div class="msg_cotainer">' + parsedReply + '<span class="msg_time">' + str_time + '</span></div></div>';
						
						$("#messageFormeight").append(botHtml);
						scrollToBottom();
					});
					
					event.preventDefault();
				});
			});
		</script>
	</body>
</html>
